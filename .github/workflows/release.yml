name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci || npm install

      - name: Ensure a recent-enough npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Verify the git tag matches package.json's version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG — refusing to publish." >&2
            exit 1
          fi
          echo "Tag v$TAG matches package.json version $PKG."

      - name: Run the full test suite before publishing
        run: |
          set -e
          for f in test/*.mjs; do
            echo "== $f =="
            node "$f"
          done

      - name: Publish to npm (Trusted Publishing — no token; provenance is automatic)
        run: npm publish --access public
